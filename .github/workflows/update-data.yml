name: Update Watershed Data

on:
  schedule:
    # Twice daily — 06:00 UTC (midnight MT) and 18:00 UTC (noon MT)
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch watershed data
        run: cd src && python generate_tana_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --staged --quiet || git commit -m "data: update watershed data $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
