<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colorado River Basin — Watershed Data</title>
  <style>
    :root {
      --bg: #0a0f14;
      --surface: #111820;
      --border: #1e2d3d;
      --text: #c9d8e8;
      --muted: #5a7a9a;
      --blue: #3b9eff;
      --teal: #1fc8c0;
      --amber: #f5a623;
      --red: #e05252;
      --green: #4caf7d;
      --purple: #9b6dff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
    }
    header {
      padding: 24px 32px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 8px;
    }
    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--teal);
      letter-spacing: -0.02em;
    }
    header p {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .updated {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
    }
    main { padding: 24px 32px; max-width: 1200px; }
    section { margin-bottom: 40px; }
    h2 {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    /* Reservoirs */
    .reservoir-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .reservoir-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }
    .reservoir-card h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--blue);
    }
    .big-number {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 4px;
    }
    .big-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .fill-bar-wrap {
      margin-bottom: 8px;
    }
    .fill-bar-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .fill-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--teal);
      transition: width 0.8s ease;
    }
    .fill-bar-fill.low { background: var(--amber); }
    .fill-bar-fill.critical { background: var(--red); }
    .fill-label {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 4px;
    }
    .reservoir-detail {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* Snowpack summary */
    .snowpack-summary {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 140px;
    }
    .stat-box .val {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--teal);
    }
    .stat-box .lbl {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Snowpack table */
    .station-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .station-table th {
      text-align: left;
      padding: 6px 10px;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    .station-table td {
      padding: 7px 10px;
      border-bottom: 1px solid rgba(30,45,61,0.6);
      color: var(--text);
    }
    .station-table tr:hover td { background: var(--surface); }
    .swe-chip {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(31,200,192,0.12);
      color: var(--teal);
    }

    /* Gauge table */
    .gauge-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    .gauge-table th {
      text-align: left;
      padding: 6px 10px;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom: 1px solid var(--border);
    }
    .gauge-table td {
      padding: 7px 10px;
      border-bottom: 1px solid rgba(30,45,61,0.6);
      color: var(--text);
    }
    .gauge-table tr:hover td { background: var(--surface); }
    .flow-val { color: var(--blue); font-weight: 600; }

    .toggle-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      margin-bottom: 12px;
    }
    .toggle-btn:hover { border-color: var(--blue); color: var(--blue); }
    .hidden { display: none; }

    footer {
      padding: 24px 32px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--blue); }

    .loading { color: var(--muted); padding: 40px; text-align: center; }
    .error { color: var(--red); padding: 16px; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🌊 Colorado River Basin — Watershed Data</h1>
    <p>Real-time stream gauges · Reservoir levels · Snowpack</p>
  </div>
  <div class="updated" id="updated">Loading…</div>
</header>

<main>
  <div id="app"><div class="loading">Fetching watershed data…</div></div>
</main>

<footer>
  <span>Data sources:
    <a href="https://waterservices.usgs.gov/" target="_blank">USGS Water Services</a> ·
    <a href="https://wcc.sc.egov.usda.gov/awdbRestApi/swagger-ui/index.html" target="_blank">NRCS SNOTEL</a>
  </span>
  <span>Updated twice daily via GitHub Actions</span>
  <span>
    <a href="https://github.com/nou-techne/watershed-data-collection" target="_blank">Source code</a> ·
    <a href="https://owockibot.xyz/bounty/" target="_blank">owockibot bounty #237</a>
  </span>
</footer>

<script>
async function load() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const d = await res.json();
    render(d);
  } catch (e) {
    document.getElementById('app').innerHTML =
      `<div class="error">Failed to load data.json: ${e.message}.<br>
       Run <code>python src/aggregate.py</code> to generate it.</div>`;
  }
}

function fmt(v, digits=0) {
  if (v === null || v === undefined) return '—';
  return Number(v).toLocaleString('en-US', { maximumFractionDigits: digits });
}

function fillClass(pct) {
  if (pct === null) return '';
  if (pct < 30) return 'critical';
  if (pct < 50) return 'low';
  return '';
}

function ago(isoStr) {
  if (!isoStr) return '—';
  const diff = Date.now() - new Date(isoStr).getTime();
  const h = Math.floor(diff / 3600000);
  if (h < 1) return `${Math.floor(diff / 60000)}m ago`;
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

function render(d) {
  // Updated timestamp
  document.getElementById('updated').textContent =
    'Data as of ' + new Date(d.fetched_at).toLocaleString('en-US', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZoneName: 'short'
    });

  let html = '';

  // === RESERVOIRS ===
  html += `<section>
    <h2>Reservoir Levels</h2>
    <div class="reservoir-grid">`;

  for (const r of d.reservoirs) {
    const pct = r.fill_pct;
    const cls = fillClass(pct);
    html += `
      <div class="reservoir-card">
        <h3>${r.name}</h3>
        <div class="big-number">${fmt(r.elevation_ft, 1)}<span style="font-size:1rem;font-weight:400;color:var(--muted)"> ft</span></div>
        <div class="big-label">Surface elevation above NGVD29 · ${ago(r.datetime)}</div>
        ${pct !== null ? `
        <div class="fill-bar-wrap">
          <div style="display:flex;justify-content:space-between;font-size:0.72rem;color:var(--muted);margin-bottom:4px">
            <span>Dead pool ${fmt(r.dead_pool_ft)} ft</span>
            <span>${fmt(pct, 1)}% of usable capacity</span>
            <span>Full ${fmt(r.full_pool_ft)} ft</span>
          </div>
          <div class="fill-bar-track">
            <div class="fill-bar-fill ${cls}" style="width:${pct}%"></div>
          </div>
        </div>` : ''}
        <div class="reservoir-detail">${r.notes}</div>
      </div>`;
  }
  html += `</div></section>`;

  // === SNOWPACK SUMMARY ===
  const sp = d.snowpack_summary;
  html += `<section>
    <h2>Snowpack — Colorado River Basin Headwaters</h2>
    <div class="snowpack-summary">
      <div class="stat-box">
        <div class="val">${fmt(sp.mean_swe_in, 1)}<span style="font-size:1rem">"</span></div>
        <div class="lbl">Basin mean SWE</div>
      </div>
      <div class="stat-box">
        <div class="val">${fmt(sp.max_swe_in, 1)}<span style="font-size:1rem">"</span></div>
        <div class="lbl">Max SWE (single station)</div>
      </div>
      <div class="stat-box">
        <div class="val">${sp.stations_reporting}</div>
        <div class="lbl">Stations reporting</div>
      </div>
      <div class="stat-box">
        <div class="val">${sp.date || '—'}</div>
        <div class="lbl">Data date</div>
      </div>
    </div>`;

  // Station table (top 25, toggle to show all)
  const stations = d.snowpack_stations || [];
  const TOP = 25;
  html += `
    <button class="toggle-btn" onclick="toggleStations(this)">Show all ${stations.length} stations ▾</button>
    <table class="station-table">
      <thead><tr>
        <th>Station</th><th>State</th><th>Elev (ft)</th>
        <th>SWE (in)</th><th>Precip (in)</th><th>Snow depth (in)</th>
      </tr></thead>
      <tbody>`;

  stations.forEach((s, i) => {
    const cls = i >= TOP ? 'hidden extra-station' : '';
    html += `<tr class="${cls}">
      <td>${s.name || '—'}</td>
      <td>${s.state || '—'}</td>
      <td>${fmt(s.elevation_ft)}</td>
      <td><span class="swe-chip">${s.swe_in !== null ? s.swe_in : '—'}</span></td>
      <td>${s.precip_in !== null ? s.precip_in : '—'}</td>
      <td>${s.snow_depth_in !== null ? s.snow_depth_in : '—'}</td>
    </tr>`;
  });

  html += `</tbody></table></section>`;

  // === STREAM GAUGES ===
  html += `<section>
    <h2>Stream Gauges</h2>
    <table class="gauge-table">
      <thead><tr>
        <th>Station</th><th>State</th>
        <th>Discharge (cfs)</th><th>Gage height (ft)</th><th>Updated</th>
      </tr></thead>
      <tbody>`;

  for (const g of d.gauges) {
    const p = g.parameters || {};
    const q = p['00060'];  // discharge
    const h = p['00065'];  // gage height
    html += `<tr>
      <td>${g.name}</td>
      <td>${g.state || '—'}</td>
      <td class="flow-val">${q ? fmt(q.value) : '—'}</td>
      <td>${h ? fmt(h.value, 2) : '—'}</td>
      <td>${ago(q?.datetime || h?.datetime)}</td>
    </tr>`;
  }

  html += `</tbody></table></section>`;

  document.getElementById('app').innerHTML = html;
}

function toggleStations(btn) {
  const rows = document.querySelectorAll('.extra-station');
  const hidden = rows[0]?.classList.contains('hidden');
  rows.forEach(r => r.classList.toggle('hidden', !hidden));
  btn.textContent = hidden ? 'Show fewer stations ▴' : `Show all ${rows.length + 25} stations ▾`;
}

load();
</script>
</body>
</html>
